<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Guessr - Baby Pink Edition</title>
    <style>
        :root { 
            --baby-pink: #ffdae0; 
            --hot-pink: #ff85a1;
            --soft-white: #fff5f7;
            --text-grey: #5d5d5d;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--baby-pink); 
            color: var(--text-grey); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { 
            width: 90%; 
            max-width: 450px; 
            background: white; 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 15px 30px rgba(255, 133, 161, 0.2); 
            text-align: center; 
        }

        h1 { color: var(--hot-pink); font-size: 2.2rem; margin-bottom: 10px; }
        .timer { font-size: 80px; font-weight: 800; color: var(--hot-pink); margin: 10px 0; }
        
        button { 
            background: var(--hot-pink); 
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 14px; 
            font-weight: 700; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            margin: 8px 0; 
            text-transform: uppercase;
        }

        button:hover { background: #ff6b8e; transform: scale(1.02); }
        .secondary-btn { background: var(--soft-white); border: 2px solid var(--hot-pink); color: var(--hot-pink); }
        .correct-btn { background: #98ddca; color: #2d5a4c; } 
        .wrong-btn { background: #ffa3a3; color: #7a2a2a; } 

        .input-card { background: var(--soft-white); padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        input { 
            background: white; 
            border: 2px solid var(--baby-pink); 
            padding: 10px; 
            border-radius: 12px; 
            font-size: 16px; 
            color: var(--text-grey); 
            outline: none;
            text-align: center;
        }
        input:focus { border-color: var(--hot-pink); }

        .name-entry { margin-bottom: 10px; display: block; width: 100%; box-sizing: border-box; }
        .hidden { display: none; }
        .answer-box { background: var(--soft-white); padding: 20px; border-radius: 20px; border: 2px dashed var(--hot-pink); margin-top: 20px; }
        .scoreboard { margin-top: 20px; text-align: left; font-size: 14px; }
        .score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--baby-pink); }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎀 Song Guessr</h1>
        
        <div id="setup-screen">
            <div class="input-card">
                <p>How many players?</p>
                <input type="number" id="playerCount" value="2" min="1">
            </div>
            <div class="input-card">
                <p>How many rounds?</p>
                <input type="number" id="roundCount" value="5" min="1">
            </div>
            <button onclick="showNameScreen()">Next: Enter Names ✨</button>
        </div>

        <div id="name-screen" class="hidden">
            <p>Who is playing?</p>
            <div id="name-inputs-container"></div>
            <button onclick="startGame()">Start Game! 🎵</button>
        </div>

        <div id="game-screen" class="hidden">
            <div style="display:flex; justify-content: space-between; font-size: 12px; font-weight: bold;">
                <span id="display-round">Round 1</span>
                <span id="display-player-name" style="color: var(--hot-pink);">Name</span>
            </div>
            
            <div id="timer" class="timer">5</div>
            <p id="rehear-display" style="font-size: 14px;">Get ready!</p>
            
            <button id="play-btn" onclick="startTurn()">Play 5 Seconds</button>
            
            <div id="post-play-controls" class="hidden">
                <button class="secondary-btn" onclick="startTurn()">Listen Again ↺</button>
                <button onclick="revealAnswer()">Reveal Answer 🔍</button>
            </div>
            
            <div id="answer-area" class="hidden">
                <div class="answer-box">
                    <h2 id="song-title" style="margin:0;">Song Name</h2>
                    <p id="song-artist" style="margin:5px 0 0 0; color: var(--hot-pink);">Artist Name</p>
                </div>
                <p style="margin-top:15px; font-weight:bold;">Did they get it right?</p>
                <div style="display:flex; gap: 10px;">
                    <button class="wrong-btn" onclick="handleScore(false)">No ❌</button>
                    <button class="correct-btn" onclick="handleScore(true)">Yes ✅</button>
                </div>
            </div>

            <div class="scoreboard" id="scoreboard"></div>
        </div>

        <div id="winner-screen" class="hidden">
            <h2 style="color: var(--hot-pink);">Winner! 🏆</h2>
            <h1 id="winner-name">Name</h1>
            <div id="final-list"></div>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script src="playlist.js"></script>

    <script>
        let players = [];
        let totalRounds = 5;
        let currentRound = 1;
        let currentPlayerIdx = 0;
        let rehearCount = 0;
        let audio = new Audio();
        let currentSong = null;

        function showNameScreen() {
            const count = document.getElementById('playerCount').value;
            const container = document.getElementById('name-inputs-container');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                container.innerHTML += `<input type="text" class="name-entry" placeholder="Player ${i} Name" id="name-${i}">`;
            }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('name-screen').classList.remove('hidden');
        }

        function startGame() {
            const count = document.getElementById('playerCount').value;
            totalRounds = document.getElementById('roundCount').value;
            players = [];
            for(let i=1; i<=count; i++) {
                let nameVal = document.getElementById(`name-${i}`).value;
                players.push({ 
                    name: nameVal || `Player ${i}`, 
                    score: 0 
                });
            }
            document.getElementById('name-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            setupTurn();
        }

        function setupTurn() {
            currentSong = mySongs[Math.floor(Math.random() * mySongs.length)];
            rehearCount = 0;
            document.getElementById('display-round').innerText = `Round ${currentRound}/${totalRounds}`;
            document.getElementById('display-player-name').innerText = players[currentPlayerIdx].name;
            document.getElementById('rehear-display').innerText = `First Listen! (5 points)`;
            document.getElementById('timer').innerText = "5";
            document.getElementById('play-btn').classList.remove('hidden');
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('answer-area').classList.add('hidden');
            updateScoreboard();
        }

        function startTurn() {
            audio.src = currentSong.url;
            audio.load();
            document.getElementById('play-btn').classList.add('hidden');
            document.getElementById('post-play-controls').classList.add('hidden');

            audio.play().then(() => {
                let timeLeft = 5;
                const interval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(interval);
                        audio.pause();
                        rehearCount++;
                        document.getElementById('post-play-controls').classList.remove('hidden');
                        
                        let points = rehearCount === 1 ? 3 : (rehearCount === 2 ? 2 : 1);
                        document.getElementById('rehear-display').innerText = `Next listen worth: ${points} points`;
                    }
                }, 1000);
            }).catch(e => alert("Make sure your phone isn't on silent!"));
        }

        function revealAnswer() {
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('song-title').innerText = currentSong.title;
            document.getElementById('song-artist').innerText = currentSong.artist;
            document.getElementById('answer-area').classList.remove('hidden');
        }

        function handleScore(isCorrect) {
            if (isCorrect) {
                if (rehearCount === 1) players[currentPlayerIdx].score += 5;
                else if (rehearCount === 2) players[currentPlayerIdx].score += 3;
                else if (rehearCount === 3) players[currentPlayerIdx].score += 2;
                else players[currentPlayerIdx].score += 1;
            }
            currentPlayerIdx++;
            if (currentPlayerIdx >= players.length) {
                currentPlayerIdx = 0;
                currentRound++;
            }
            if (currentRound > totalRounds) showWinner();
            else setupTurn();
        }

        function updateScoreboard() {
            let html = '<p style="font-weight:bold; color:var(--hot-pink); margin-bottom:5px;">Scores</p>';
            players.forEach(p => {
                html += `<div class="score-row"><span>${p.name}</span><span>${p.score} pts</span></div>`;
            });
            document.getElementById('scoreboard').innerHTML = html;
        }

        function showWinner() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('winner-screen').classList.remove('hidden');
            let sorted = [...players].sort((a,b) => b.score - a.score);
            document.getElementById('winner-name').innerText = sorted[0].name;
            let finalHtml = '';
            sorted.forEach(p => finalHtml += `<p>${p.name}: ${p.score} pts</p>`);
            document.getElementById('final-list').innerHTML = finalHtml;
        }
    </script>
</body>
</html>

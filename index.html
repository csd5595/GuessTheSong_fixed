<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Guessr - Tournament Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --baby-pink: #ffb7c5; 
            --hot-pink: #ff85a1;
            --dark-bg: #000000;
            --card-bg: #111111;
            --mint: #b2f2bb;
            --coral: #ff8787;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--dark-bg); 
            color: var(--baby-pink); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Custom Mobile Alert */
        #custom-alert {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: var(--hot-pink);
            color: black;
            padding: 15px;
            border-radius: 0 0 20px 20px;
            font-weight: bold;
            z-index: 999;
            transition: top 0.5s ease;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 133, 161, 0.5);
        }

        .container { 
            width: 90%; 
            max-width: 450px; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 30px; 
            border: 2px solid var(--baby-pink);
            box-shadow: 0 0 20px rgba(255, 183, 197, 0.2); 
            text-align: center; 
        }

        h1 { color: var(--baby-pink); font-size: 1.8rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .timer { font-size: 70px; font-weight: 800; color: var(--hot-pink); margin: 5px 0; text-shadow: 0 0 15px var(--hot-pink); }
        
        button { 
            background: var(--baby-pink); 
            color: black; 
            border: none; 
            padding: 18px; 
            font-size: 13px; 
            font-weight: 900; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            margin: 6px 0; 
            text-transform: uppercase;
        }

        .secondary-btn { background: transparent; border: 2px solid var(--baby-pink); color: var(--baby-pink); }
        .pass-btn { background: #222; color: #888; border: 1px dashed #444; font-size: 10px; padding: 10px; }
        .extend-btn { background: #331a1e; color: var(--hot-pink); border: 2px solid var(--hot-pink); font-size: 11px; }

        .correct-btn { background: var(--mint); color: #1a3b1f; } 
        .wrong-btn { background: var(--coral); color: #3b1a1a; } 

        /* Fixed Mobile Inputs */
        input { 
            background: #222 !important; 
            border: 2px solid var(--baby-pink); 
            padding: 15px; 
            border-radius: 10px; 
            color: var(--baby-pink) !important; 
            font-size: 18px; 
            width: 80%; 
            margin: 10px 0;
            display: inline-block;
            -webkit-appearance: none;
        }

        .input-card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .hidden { display: none; }
        .answer-box { background: #000; padding: 20px; border-radius: 20px; border: 1px solid var(--baby-pink); margin-top: 15px; }
        .scoreboard { margin-top: 20px; text-align: left; border-top: 1px solid #333; padding-top: 15px; }
        .score-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 12px; }
    </style>
</head>
<body>

    <div id="custom-alert">ALERT MESSAGE</div>

    <div class="container">
        <h1>🎀 GUESS THE SONG</h1>
        
        <div id="setup-screen">
            <div class="input-card"><p>PLAYERS</p><input type="number" id="playerCount" value="2"></div>
            <div class="input-card"><p>ROUNDS</p><input type="number" id="roundCount" value="5"></div>
            <button onclick="showNameScreen()">ENTER NAMES</button>
        </div>

        <div id="name-screen" class="hidden">
            <p>NAME THE PLAYERS:</p>
            <div id="name-inputs-container"></div>
            <button onclick="startGame()">START TOURNAMENT 🎵</button>
        </div>

        <div id="game-screen" class="hidden">
            <div style="display:flex; justify-content: space-between; font-size: 12px; font-weight: bold;">
                <span id="display-round">ROUND 1</span>
                <span id="display-player-name" style="color: var(--hot-pink);">PLAYER</span>
            </div>
            
            <div id="timer" class="timer">5</div>
            <p id="rehear-display" style="font-size: 13px; margin-bottom: 15px;">READY?</p>
            
            <button id="play-btn" onclick="startTurn(5)">PLAY 5 SECONDS</button>
            
            <div id="post-play-controls" class="hidden">
                <button class="secondary-btn" id="rehear-btn-el" onclick="startTurn(5)">REHEAR ↺</button>
                <button class="extend-btn" id="extend-btn-el" onclick="useExtend()">EXTEND TO 10s (-1 PT)</button>
                <button onclick="revealAnswer()">REVEAL ANSWER 🔍</button>
                <button id="pass-btn-el" class="pass-btn" onclick="usePass()">SKIP SONG</button>
            </div>
            
            <div id="answer-area" class="hidden">
                <div class="answer-box">
                    <h2 id="song-title" style="margin:0; color: white; font-size: 1.2rem;">SONG NAME</h2>
                    <p id="song-artist" style="margin:5px 0 0 0; color: var(--hot-pink); font-size: 0.9rem;">ARTIST NAME</p>
                </div>
                <div style="display:flex; gap: 10px; margin-top: 20px;">
                    <button class="wrong-btn" onclick="handleScore(false)">NO ❌</button>
                    <button class="correct-btn" onclick="handleScore(true)">YES ✅</button>
                </div>
            </div>

            <div class="scoreboard" id="scoreboard"></div>
        </div>

        <div id="winner-screen" class="hidden">
            <p>CHAMPION</p>
            <h1 id="winner-name" style="font-size: 32px; color: var(--hot-pink);">NAME</h1>
            <div id="final-list" style="margin-bottom: 20px;"></div>
            <button onclick="location.reload()">NEW TOURNAMENT</button>
        </div>
    </div>

    <script src="playlist.js"></script>
    <script>
        let players = [];
        let unusedSongs = [];
        let totalRounds = 5, currentRound = 1, currentPlayerIdx = 0;
        let rehearCount = 0, audio = new Audio(), currentSong = null;
        let extensionFeeTotal = 0; 
        let isExtendedMode = false;

        function showAlert(msg) {
            const el = document.getElementById('custom-alert');
            el.innerText = msg;
            el.style.top = "0";
            setTimeout(() => { el.style.top = "-100px"; }, 3000);
        }

        function showNameScreen() {
            const count = document.getElementById('playerCount').value;
            const container = document.getElementById('name-inputs-container');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                container.innerHTML += `<input type="text" placeholder="PLAYER ${i} NAME" id="name-${i}">`;
            }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('name-screen').classList.remove('hidden');
        }

        function startGame() {
            totalRounds = parseInt(document.getElementById('roundCount').value) || 5;
            const count = document.getElementById('playerCount').value || 1;
            for(let i=1; i<=count; i++) {
                let nameVal = document.getElementById(`name-${i}`).value;
                players.push({ name: nameVal || `PLAYER ${i}`, score: 0, passesUsed: 0 });
            }
            unusedSongs = [...mySongs];
            document.getElementById('name-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            setupTurn();
        }

        function setupTurn() {
            if (unusedSongs.length === 0) {
                showAlert("Library Restarted!");
                unusedSongs = [...mySongs];
            }
            const randomIndex = Math.floor(Math.random() * unusedSongs.length);
            currentSong = unusedSongs[randomIndex];
            rehearCount = 0; extensionFeeTotal = 0; isExtendedMode = false;
            
            document.getElementById('display-round').innerText = `ROUND ${currentRound}/${totalRounds}`;
            document.getElementById('display-player-name').innerText = players[currentPlayerIdx].name.toUpperCase();
            document.getElementById('rehear-display').innerText = `WORTH 5 POINTS`;
            document.getElementById('timer').innerText = "5";
            document.getElementById('play-btn').classList.remove('hidden');
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('answer-area').classList.add('hidden');
            document.getElementById('rehear-btn-el').innerText = "REHEAR ↺";
            updateScoreboard();
        }

        function startTurn(seconds) {
            audio.src = currentSong.url;
            audio.load();
            document.getElementById('play-btn').classList.add('hidden');
            document.getElementById('post-play-controls').classList.add('hidden');

            audio.play().then(() => {
                let timeLeft = seconds;
                document.getElementById('timer').innerText = timeLeft;
                const interval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(interval);
                        audio.pause();
                        if(seconds === 5) rehearCount++;
                        document.getElementById('post-play-controls').classList.remove('hidden');
                        updatePotentialPoints();
                        const p = players[currentPlayerIdx];
                        document.getElementById('pass-btn-el').innerText = p.passesUsed === 0 ? "FREE SKIP" : "SKIP (-3 PTS)";
                    }
                }, 1000);
            }).catch(e => showAlert("Tap Play to Enable Audio"));
        }

        function updatePotentialPoints() {
            let base = (rehearCount === 1) ? 3 : (rehearCount === 2 ? 2 : 1);
            let potential = base - extensionFeeTotal;
            document.getElementById('rehear-display').innerText = `NEXT PLAY WORTH: ${potential} PTS`;
            document.getElementById('rehear-btn-el').innerText = isExtendedMode ? "REHEAR 10s ↺" : "REHEAR 5s ↺";
        }

        function useExtend() {
            extensionFeeTotal = 1; 
            isExtendedMode = true;
            startTurn(10); 
        }

        function usePass() {
            const p = players[currentPlayerIdx];
            if (p.passesUsed > 0) { p.score -= 3; showAlert("-3 Points Penalty!"); }
            p.passesUsed++;
            setupTurn(); 
        }

        function revealAnswer() {
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('song-title').innerText = currentSong.title.toUpperCase();
            document.getElementById('song-artist').innerText = currentSong.artist.toUpperCase();
            document.getElementById('answer-area').classList.remove('hidden');
            unusedSongs = unusedSongs.filter(s => s.url !== currentSong.url);
            audio.currentTime = 0; audio.play(); 
        }

        function handleScore(isCorrect) {
            audio.pause(); 
            if (isCorrect) {
                let val = (rehearCount === 1) ? 5 : (rehearCount === 2 ? 3 : (rehearCount === 3 ? 2 : 1));
                players[currentPlayerIdx].score += (val - extensionFeeTotal);
            } else {
                players[currentPlayerIdx].score -= extensionFeeTotal;
            }
            currentPlayerIdx++;
            if (currentPlayerIdx >= players.length) { currentPlayerIdx = 0; currentRound++; }
            if (currentRound > totalRounds) showWinner(); else setupTurn();
        }

        function updateScoreboard() {
            let html = '<p style="font-weight:bold; color:var(--hot-pink); font-size:10px;">LEADERBOARD</p>';
            players.forEach(p => {
                html += `<div class="score-row"><span>${p.name.toUpperCase()}</span><span>${p.score} PTS</span></div>`;
            });
            document.getElementById('scoreboard').innerHTML = html;
        }

        function showWinner() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('winner-screen').classList.remove('hidden');
            let sorted = [...players].sort((a,b) => b.score - a.score);
            document.getElementById('winner-name').innerText = sorted[0].name.toUpperCase();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffb7c5', '#ff85a1'] });
            let finalHtml = '';
            sorted.forEach(p => finalHtml += `<p>${p.name.toUpperCase()}: ${p.score} PTS</p>`);
            document.getElementById('final-list').innerHTML = finalHtml;
        }
    </script>
</body>
</html>

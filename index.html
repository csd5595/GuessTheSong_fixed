<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Guessr Pro</title>
    <style>
        :root { --spotify-green: #1DB954; --bg-dark: #121212; --card-bg: #181818; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 450px; background: var(--card-bg); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid #282828; }
        h1 { color: var(--spotify-green); font-size: 2rem; margin-bottom: 10px; letter-spacing: -1px; }
        .timer { font-size: 80px; font-weight: 800; margin: 20px 0; color: var(--spotify-green); text-shadow: 0 0 20px rgba(29, 185, 84, 0.3); }
        h3 { color: #b3b3b3; font-weight: 400; margin-bottom: 30px; }
        
        button { background: var(--spotify-green); color: black; border: none; padding: 16px 32px; font-size: 16px; font-weight: 700; border-radius: 50px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; margin: 8px 0; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { transform: scale(1.03); background: #1ed760; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; }
        .secondary-btn { background: transparent; border: 2px solid #555; color: white; }
        .secondary-btn:hover { border-color: white; background: transparent; }

        input { background: #282828; border: 1px solid #404040; color: white; padding: 12px; border-radius: 8px; width: 60px; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--spotify-green); }

        .hidden { display: none; }
        .answer-box { background: #282828; padding: 25px; border-radius: 16px; margin-top: 20px; border-left: 5px solid var(--spotify-green); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #song-title { font-size: 24px; margin: 0; }
        #song-artist { color: #b3b3b3; margin-top: 5px; font-size: 16px; }
        .control-group { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Song Guessr</h1>
        
        <div id="setup-screen">
            <p style="color: #b3b3b3;">Ready to test your ears?</p>
            <label style="display:block; margin-bottom: 10px;">Number of Players:</label>
            <input type="number" id="playerInput" value="2" min="1">
            <button onclick="startGame()">Start Competition</button>
        </div>

        <div id="game-screen" class="hidden">
            <h3 id="player-turn">Player 1's Turn</h3>
            <div id="timer" class="timer">5</div>
            
            <button id="play-btn" onclick="startTurn()">Play 5 Seconds</button>
            
            <div id="post-play-controls" class="hidden">
                <button class="secondary-btn" onclick="startTurn()">Rehear Song ↺</button>
                <button onclick="revealAnswer()">Reveal Answer</button>
            </div>
            
            <div id="answer-area" class="hidden">
                <div class="answer-box">
                    <p style="color: var(--spotify-green); font-size: 12px; font-weight: bold; margin: 0 0 10px 0;">REVEALED</p>
                    <h2 id="song-title">Song Name</h2>
                    <p id="song-artist">Artist Name</p>
                </div>
                <button onclick="nextPlayer()" style="margin-top: 20px;">Next Player →</button>
            </div>
        </div>
    </div>

    <script src="playlist.js"></script>

    <script>
        let players = [];
        let currentPlayer = 0;
        let audio = new Audio();
        let currentSong = null;

        function startGame() {
            const count = document.getElementById('playerInput').value;
            players = [];
            for(let i=1; i<=count; i++) players.push(`Player ${i}`);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            // Select first song immediately but don't play yet
            currentSong = mySongs[Math.floor(Math.random() * mySongs.length)];
            updateTurnText();
        }

        function updateTurnText() {
            document.getElementById('player-turn').innerText = `${players[currentPlayer]}'s Turn`;
        }

        function startTurn() {
            if (typeof mySongs === 'undefined') return alert("Playlist error!");

            audio.src = currentSong.url;
            audio.load();
            
            document.getElementById('play-btn').classList.add('hidden');
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('timer').innerText = "5";

            audio.play().then(() => {
                let timeLeft = 5;
                const interval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(interval);
                        audio.pause();
                        document.getElementById('post-play-controls').classList.remove('hidden');
                    }
                }, 1000);
            }).catch(e => alert("Please check your volume/mute switch!"));
        }

        function revealAnswer() {
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('song-title').innerText = currentSong.title;
            document.getElementById('song-artist').innerText = currentSong.artist;
            document.getElementById('answer-area').classList.remove('hidden');
        }

        function nextPlayer() {
            currentPlayer = (currentPlayer + 1) % players.length;
            currentSong = mySongs[Math.floor(Math.random() * mySongs.length)];
            
            document.getElementById('answer-area').classList.add('hidden');
            document.getElementById('play-btn').classList.remove('hidden');
            document.getElementById('timer').innerText = "5";
            updateTurnText();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Guessr Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #1DB954; }
        .timer { font-size: 60px; font-weight: bold; margin: 20px 0; color: #1DB954; }
        button { background: #1DB954; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; transition: 0.2s; width: 100%; margin: 10px 0; }
        button:hover { background: #1ed760; transform: scale(1.02); }
        button:disabled { background: #444; cursor: not-allowed; }
        .hidden { display: none; }
        .answer-box { background: #333; padding: 15px; border-radius: 10px; margin-top: 20px; border: 2px solid #1DB954; }
        input { padding: 10px; border-radius: 5px; width: 60px; border: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Song Guessr</h1>
        
        <div id="setup-screen">
            <p>How many players?</p>
            <input type="number" id="playerInput" value="2" min="1">
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="game-screen" class="hidden">
            <h3 id="player-turn">Player 1's Turn</h3>
            <div id="timer" class="timer">5</div>
            <button id="play-btn" onclick="startTurn()">Play 5 Seconds</button>
            
            <div id="answer-area" class="hidden">
                <div class="answer-box">
                    <p>The song was:</p>
                    <h2 id="song-title">Song Name</h2>
                    <p id="song-artist">Artist Name</p>
                </div>
                <button onclick="nextPlayer()">Next Player →</button>
            </div>
        </div>
    </div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Guessr - Pro Tournament</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --baby-pink: #ffb7c5; 
            --hot-pink: #ff85a1;
            --dark-bg: #000000;
            --card-bg: #111111;
            --mint: #b2f2bb;
            --coral: #ff8787;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--dark-bg); 
            color: var(--baby-pink); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .container { 
            width: 90%; 
            max-width: 450px; 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 30px; 
            border: 2px solid var(--baby-pink);
            box-shadow: 0 0 20px rgba(255, 183, 197, 0.2); 
            text-align: center; 
            position: relative;
        }

        h1 { color: var(--baby-pink); font-size: 2.2rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .timer { font-size: 80px; font-weight: 800; color: var(--hot-pink); margin: 10px 0; text-shadow: 0 0 15px var(--hot-pink); }
        
        button { 
            background: var(--baby-pink); 
            color: black; 
            border: none; 
            padding: 16px; 
            font-size: 14px; 
            font-weight: 800; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            margin: 8px 0; 
            text-transform: uppercase;
        }

        button:hover { background: var(--hot-pink); transform: translateY(-2px); }
        .secondary-btn { background: transparent; border: 2px solid var(--baby-pink); color: var(--baby-pink); }
        
        .pass-btn { background: #222; color: #777; border: 1px dashed #444; font-size: 10px; margin-top: 10px; padding: 8px; }
        .extend-btn { background: #331a1e; color: var(--hot-pink); border: 1px solid var(--hot-pink); font-size: 11px; margin-top: 10px; }

        .correct-btn { background: var(--mint); color: #2b5e32; } 
        .wrong-btn { background: var(--coral); color: #5c1e1e; } 

        input { background: #000; border: 1px solid var(--baby-pink); padding: 12px; border-radius: 8px; color: var(--baby-pink); text-align: center; width: 80%; outline: none; }
        .input-card { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        
        .hidden { display: none; }
        .answer-box { background: #000; padding: 20px; border-radius: 20px; border: 1px solid var(--baby-pink); margin-top: 20px; }
        .scoreboard { margin-top: 25px; text-align: left; border-top: 1px solid #333; padding-top: 15px; }
        .score-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 11px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎀 GUESS THE SONG</h1>
        
        <div id="setup-screen">
            <div class="input-card"><p>PLAYERS</p><input type="number" id="playerCount" value="2"></div>
            <div class="input-card"><p>ROUNDS</p><input type="number" id="roundCount" value="5"></div>
            <button onclick="showNameScreen()">ENTER NAMES</button>
        </div>

        <div id="name-screen" class="hidden">
            <p>NAME THE PLAYERS:</p>
            <div id="name-inputs-container"></div>
            <button onclick="startGame()">START TOURNAMENT 🎵</button>
        </div>

        <div id="game-screen" class="hidden">
            <div style="display:flex; justify-content: space-between; font-size: 13px; font-weight: bold;">
                <span id="display-round">ROUND 1</span>
                <span id="display-player-name" style="color: var(--hot-pink);">PLAYER</span>
            </div>
            
            <div id="timer" class="timer">5</div>
            <p id="rehear-display" style="font-size: 13px; margin-bottom: 20px;">READY?</p>
            
            <button id="play-btn" onclick="startTurn(5)">PLAY 5 SECONDS</button>
            
            <div id="post-play-controls" class="hidden">
                <button class="secondary-btn" onclick="startTurn(5)">REHEAR ↺</button>
                <button class="extend-btn" onclick="useExtend()">EXTEND TO 10s (-1 PT)</button>
                <button onclick="revealAnswer()">REVEAL ANSWER 🔍</button>
                <button id="pass-btn-el" class="pass-btn" onclick="usePass()">SKIP SONG</button>
            </div>
            
            <div id="answer-area" class="hidden">
                <div class="answer-box">
                    <h2 id="song-title" style="margin:0; color: white;">SONG NAME</h2>
                    <p id="song-artist" style="margin:5px 0 0 0; color: var(--hot-pink);">ARTIST NAME</p>
                </div>
                <div style="display:flex; gap: 10px; margin-top: 20px;">
                    <button class="wrong-btn" onclick="handleScore(false)">❌ NO</button>
                    <button class="correct-btn" onclick="handleScore(true)">✅ YES</button>
                </div>
            </div>

            <div class="scoreboard" id="scoreboard"></div>
        </div>

        <div id="winner-screen" class="hidden">
            <p>CHAMPION</p>
            <h1 id="winner-name" style="font-size: 40px; color: var(--hot-pink);">NAME</h1>
            <div id="final-list" style="margin-bottom: 20px;"></div>
            <button onclick="location.reload()">NEW TOURNAMENT</button>
        </div>
    </div>

    <script src="playlist.js"></script>
    <script>
        let players = [];
        let unusedSongs = [];
        let totalRounds = 5, currentRound = 1, currentPlayerIdx = 0;
        let rehearCount = 0, audio = new Audio(), currentSong = null;
        let extensionPenalty = 0; // New variable to track extension debt

        function showNameScreen() {
            const count = document.getElementById('playerCount').value;
            const container = document.getElementById('name-inputs-container');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) container.innerHTML += `<input type="text" style="margin-bottom:10px; display:block; width:100%; box-sizing:border-box;" placeholder="NAME PLAYER ${i}" id="name-${i}">`;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('name-screen').classList.remove('hidden');
        }

        function startGame() {
            totalRounds = parseInt(document.getElementById('roundCount').value);
            const count = document.getElementById('playerCount').value;
            for(let i=1; i<=count; i++) {
                let nameVal = document.getElementById(`name-${i}`).value;
                players.push({ name: nameVal || `PLAYER ${i}`, score: 0, passesUsed: 0 });
            }
            unusedSongs = [...mySongs];
            document.getElementById('name-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            setupTurn();
        }

        function setupTurn() {
            if (unusedSongs.length === 0) {
                alert("💖 ALL SONGS PLAYED! RESTARTING LIBRARY...");
                unusedSongs = [...mySongs];
            }
            const randomIndex = Math.floor(Math.random() * unusedSongs.length);
            currentSong = unusedSongs[randomIndex];
            
            rehearCount = 0;
            extensionPenalty = 0; // Reset penalty for new turn
            const p = players[currentPlayerIdx];
            document.getElementById('display-round').innerText = `ROUND ${currentRound}/${totalRounds}`;
            document.getElementById('display-player-name').innerText = p.name.toUpperCase();
            document.getElementById('rehear-display').innerText = `WORTH 5 POINTS`;
            document.getElementById('timer').innerText = "5";
            document.getElementById('play-btn').classList.remove('hidden');
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('answer-area').classList.add('hidden');
            updateScoreboard();
        }

        function startTurn(seconds) {
            audio.src = currentSong.url;
            audio.load();
            document.getElementById('play-btn').classList.add('hidden');
            document.getElementById('post-play-controls').classList.add('hidden');

            audio.play().then(() => {
                let timeLeft = seconds;
                document.getElementById('timer').innerText = timeLeft;
                const interval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(interval);
                        audio.pause();
                        if(seconds === 5) rehearCount++;
                        document.getElementById('post-play-controls').classList.remove('hidden');
                        
                        let pts = rehearCount === 1 ? 3 : (rehearCount === 2 ? 2 : 1);
                        document.getElementById('rehear-display').innerText = `NEXT PLAY WORTH: ${pts} PTS`;
                        
                        const p = players[currentPlayerIdx];
                        document.getElementById('pass-btn-el').innerText = p.passesUsed === 0 ? "FREE SKIP" : "SKIP (-3 PTS)";
                    }
                }, 1000);
            }).catch(e => console.log("Blocked"));
        }

        function useExtend() {
            extensionPenalty = 1; // Mark that 1 point will be removed from final gain
            document.getElementById('rehear-display').innerText = `EXTENDED! (-1 PT APPLIED)`;
            startTurn(10); // Now plays for 10 seconds total
        }

        function usePass() {
            const p = players[currentPlayerIdx];
            if (p.passesUsed > 0) p.score -= 3;
            p.passesUsed++;
            setupTurn(); 
        }

        function revealAnswer() {
            document.getElementById('post-play-controls').classList.add('hidden');
            document.getElementById('song-title').innerText = currentSong.title.toUpperCase();
            document.getElementById('song-artist').innerText = currentSong.artist.toUpperCase();
            document.getElementById('answer-area').classList.remove('hidden');
            
            unusedSongs = unusedSongs.filter(s => s.url !== currentSong.url);

            audio.currentTime = 0;
            audio.play(); 
        }

        function handleScore(isCorrect) {
            audio.pause(); 
            if (isCorrect) {
                let turnPoints = 0;
                if (rehearCount === 1) turnPoints = 5;
                else if (rehearCount === 2) turnPoints = 3;
                else if (rehearCount === 3) turnPoints = 2;
                else turnPoints = 1;

                // Subtract extension penalty from the earned points
                players[currentPlayerIdx].score += (turnPoints - extensionPenalty);
            } else {
                // If they are wrong, they still lose the point for extending if they used it
                players[currentPlayerIdx].score -= extensionPenalty;
            }

            currentPlayerIdx++;
            if (currentPlayerIdx >= players.length) { currentPlayerIdx = 0; currentRound++; }
            if (currentRound > totalRounds) showWinner();
            else setupTurn();
        }

        function updateScoreboard() {
            let html = '<p style="font-weight:bold; color:var(--hot-pink); font-size:10px;">LEADERBOARD</p>';
            players.forEach(p => {
                html += `<div class="score-row"><span>${p.name.toUpperCase()}</span><span>${p.score} PTS</span></div>`;
            });
            document.getElementById('scoreboard').innerHTML = html;
        }

        function showWinner() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('winner-screen').classList.remove('hidden');
            let sorted = [...players].sort((a,b) => b.score - a.score);
            document.getElementById('winner-name').innerText = sorted[0].name.toUpperCase();
            
            var end = Date.now() + 5000;
            var colors = ['#ffb7c5', '#ff85a1', '#ffffff'];
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            let finalHtml = '';
            sorted.forEach(p => finalHtml += `<p>${p.name.toUpperCase()}: ${p.score} PTS</p>`);
            document.getElementById('final-list').innerHTML = finalHtml;
        }
    </script>
</body>
</html>
